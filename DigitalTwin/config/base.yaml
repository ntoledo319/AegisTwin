# Base configuration for the Integrated Data Analysis & Digital Twin System

# Application settings
app:
  name: Integrated Data Analysis & Digital Twin System
  version: 0.1.0
  environment: development
  debug: true
  log_level: info

# Server settings
server:
  host: 0.0.0.0
  port: 8000
  workers: 4
  timeout: 60

# Database settings
database:
  postgres:
    host: localhost
    port: 5432
    database: integrated_system
    user: postgres
    password: postgres
    echo: false
    pool_size: 5
    max_overflow: 10
  mongodb:
    host: localhost
    port: 27017
    database: integrated_system
  redis:
    host: localhost
    port: 6379
    db: 0
  neo4j:
    uri: bolt://localhost:7687
    user: neo4j
    password: password

# Storage settings
storage:
  data_dir: data
  cache_dir: cache
  logs_dir: logs
  results_dir: results
  temp_dir: temp

# API settings
api:
  prefix: /api/v1
  cors_origins:
    - http://localhost:3000
    - http://localhost:8000
  rate_limit:
    enabled: true
    requests_per_minute: 100

# Data processing settings
data_processing:
  batch_size: 1000
  max_workers: 4
  timeout: 300
  connectors:
    email:
      enabled: true
      providers:
        - gmail
        - outlook
        - imap
    messages:
      enabled: true
      providers:
        - whatsapp
        - telegram
        - signal
    calendar:
      enabled: true
      providers:
        - google
        - outlook
        - ical
    social:
      enabled: true
      providers:
        - twitter
        - linkedin
        - facebook

# Analysis settings
analysis:
  communication:
    enabled: true
    max_messages: 10000
    time_window_days: 365
  advanced:
    enabled: true
    nlp:
      model: en_core_web_md
      batch_size: 100
    topic_modeling:
      num_topics: 20
      min_topic_size: 5
  cognitive:
    enabled: true
    personality:
      model: big_five
    values:
      model: schwartz
    memory:
      max_memories: 10000

# Digital twin settings
digital_twin:
  personality:
    update_frequency: daily
    adaptation_rate: 0.1
  memory:
    retention_policy:
      episodic_days: 365
      semantic_days: 730
    importance_threshold: 0.3
  conversation:
    response_time: medium
    detail_level: high
    formality: adaptive
    tone: friendly

# Knowledge graph settings
knowledge_graph:
  max_entities: 10000
  max_relationships: 50000
  importance_threshold: 0.2
  update_frequency: daily

# Visualization settings
visualization:
  charts:
    default_theme: light
    color_palette: viridis
  dashboards:
    refresh_interval: 300
    max_items: 20

# Web interface settings
web:
  host: 0.0.0.0
  port: 3000
  static_dir: web/static
  templates_dir: web/templates