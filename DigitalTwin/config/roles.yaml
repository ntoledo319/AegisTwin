# SpiderMind Omega Roles Configuration

# Settings for role assignment
settings:
  dynamic_detection: true
  confidence_threshold: 0.75
  temporal_evolution: true
  context_sensitive: true
  update_frequency: "monthly"

# Static role assignments
static_roles:
  # Family relationships
  family:
    - "Mom"
    - "Dad"
    - "Mom & Dad"
    - "Connie"
    - "Aunt Sarah"
    - "Uncle Jim"
    - "Grandma"
    - "Grandpa"
    - "Cousin Mike"
    description: "Family members with biological or legal relationship"
    importance: "high"
    expected_communication:
      frequency: "weekly"
      depth: "high"
      topics:
        - "personal wellbeing"
        - "life updates"
        - "family events"
        - "support"
  
  # Mentorship relationships
  mentorship:
    - "Quinn"
    - "RJ"
    - "Chris"
    - "Oliver"
    - "Veni/Laura"
    - "Miles"
    - "Philip"
    - "Tobias"
    - "Little Jess"
    description: "People you mentor or guide"
    importance: "high"
    expected_communication:
      frequency: "biweekly"
      depth: "medium-high"
      topics:
        - "personal growth"
        - "challenges"
        - "advice"
        - "feedback"
        - "support"
  
  # Romantic relationships and interests
  romantic_candidates:
    - "Lily"
    - "Marisa"
    - "Steph"
    - "Isabel"
    - "belladonna"
    description: "People with romantic connection or potential"
    importance: "high"
    expected_communication:
      frequency: "daily"
      depth: "very high"
      topics:
        - "emotional connection"
        - "shared experiences"
        - "future plans"
        - "daily life"
        - "intimacy"
  
  # Close platonic relationships
  anchors_platonic:
    - "Ian L"
    - "Max"
    - "Shan / Shannan"
    - "Gabby"
    description: "Close friends with deep platonic bonds"
    importance: "high"
    expected_communication:
      frequency: "weekly"
      depth: "high"
      topics:
        - "shared interests"
        - "emotional support"
        - "life updates"
        - "social planning"
  
  # Professional relationships
  professional:
    - "Dr. Smith"
    - "Professor Johnson"
    - "Boss"
    - "Colleague"
    description: "Work or academic connections"
    importance: "medium"
    expected_communication:
      frequency: "as needed"
      depth: "medium"
      topics:
        - "work tasks"
        - "academic matters"
        - "professional development"
        - "scheduling"
  
  # Service providers
  service_providers:
    - "Therapist"
    - "Doctor"
    - "Landlord"
    - "Mechanic"
    description: "People providing professional services"
    importance: "low-medium"
    expected_communication:
      frequency: "as needed"
      depth: "low"
      topics:
        - "appointments"
        - "services"
        - "payments"
        - "issues"
  
  # Acquaintances
  acquaintances:
    - "School Friend"
    - "Neighbor"
    - "Gym Buddy"
    description: "Casual connections with limited depth"
    importance: "low"
    expected_communication:
      frequency: "occasional"
      depth: "low"
      topics:
        - "casual conversation"
        - "specific shared contexts"
        - "light social interaction"

# Group chat categories
group_chats:
  primary_groups:
    - "Crew"
    - "Hoes and Homos"
    - "Mental Deranged"
    description: "Primary social groups with regular interaction"
    importance: "high"
    expected_communication:
      frequency: "daily"
      depth: "medium-high"
      topics:
        - "social planning"
        - "shared experiences"
        - "group dynamics"
        - "humor"
  
  family_groups:
    - "Aunts, Uncs"
    - "Family Chat"
    - "Siblings"
    description: "Family group conversations"
    importance: "medium-high"
    expected_communication:
      frequency: "weekly"
      depth: "medium"
      topics:
        - "family updates"
        - "planning"
        - "shared memories"
  
  interest_groups:
    - "Book Club"
    - "Gaming Group"
    - "Hiking Crew"
    description: "Groups organized around specific interests"
    importance: "medium"
    expected_communication:
      frequency: "weekly"
      depth: "medium-low"
      topics:
        - "shared interests"
        - "activity planning"
        - "topic discussion"
  
  utility_groups:
    - "Apartment"
    - "Work Team"
    - "Class Project"
    description: "Groups with practical purposes"
    importance: "medium-low"
    expected_communication:
      frequency: "as needed"
      depth: "low"
      topics:
        - "coordination"
        - "information sharing"
        - "problem solving"

# Keywords for dynamic role detection
role_keywords:
  family_indicators:
    - "mom"
    - "dad"
    - "parent"
    - "brother"
    - "sister"
    - "aunt"
    - "uncle"
    - "cousin"
    - "grandma"
    - "grandpa"
  
  romantic_indicators:
    - "love you"
    - "miss you"
    - "date"
    - "boyfriend"
    - "girlfriend"
    - "partner"
    - "relationship"
    - "together"
  
  mentorship_indicators:
    - "advice"
    - "help with"
    - "guidance"
    - "teach"
    - "learn from"
    - "mentor"
    - "look up to"
  
  professional_indicators:
    - "work"
    - "job"
    - "project"
    - "deadline"
    - "meeting"
    - "client"
    - "boss"
    - "colleague"
  
  group_indicators:
    - "group"
    - "crew"
    - "gang"
    - "squad"
    - "team"
    - "chat"
    - "everyone"
    - "all"
    - "we"
    - "us"

# Relationship dynamics patterns
relationship_patterns:
  support_provider:
    indicators:
      - "always there for me"
      - "helped me through"
      - "supported me"
      - "listened"
      - "advice"
    weight: 0.8
  
  conflict_pattern:
    indicators:
      - "argument"
      - "fight"
      - "disagree"
      - "upset with"
      - "angry"
      - "sorry"
    weight: 0.7
  
  trust_pattern:
    indicators:
      - "trust"
      - "confide"
      - "secret"
      - "just between us"
      - "don't tell"
    weight: 0.9
  
  distance_pattern:
    indicators:
      - "miss you"
      - "been a while"
      - "catch up"
      - "long time"
      - "reconnect"
    weight: 0.6

# Temporal relationship evolution
temporal_patterns:
  intensity_increase:
    indicators:
      - "message_frequency_increase"
      - "conversation_length_increase"
      - "topic_depth_increase"
      - "emotional_language_increase"
    significance: "high"
  
  intensity_decrease:
    indicators:
      - "message_frequency_decrease"
      - "conversation_length_decrease"
      - "response_time_increase"
      - "topic_depth_decrease"
    significance: "high"
  
  role_transition:
    indicators:
      - "language_pattern_shift"
      - "topic_distribution_change"
      - "formality_change"
      - "reference_term_change"
    significance: "very high"