# MindMirror Configuration

data:
  messages_file: "data/messages_complete.json"
  cache_dir: "data/cache"
  model_dir: "data/models"

cognitive_model:
  # Personality modeling parameters
  personality:
    enabled: true
    big_five_analysis: true
    communication_style_analysis: true
    update_frequency: "weekly"
  
  # Decision modeling parameters
  decision:
    enabled: true
    confidence_threshold: 0.75
    context_window_size: 50
    decision_history_length: 100
  
  # Memory modeling parameters
  memory:
    enabled: true
    episodic_memory_size: 1000
    semantic_memory_size: 5000
    memory_decay_rate: 0.05
    important_memory_boost: 5.0
  
  # Value system parameters
  values:
    enabled: true
    value_extraction_threshold: 0.6
    value_conflict_detection: true
    moral_foundation_analysis: true

language_model:
  vocabulary_size: 50000
  context_length: 20
  style_matching: true
  emotion_detection: true
  topic_modeling:
    num_topics: 50
    algorithm: "lda"
  
interface:
  api:
    enabled: true
    port: 5000
    host: "127.0.0.1"
    debug: false
  
  cli:
    enabled: true
    verbose: true
    color: true
    history_file: ".mindmirror_history"

analysis:
  # Analysis parameters
  temporal_analysis:
    enabled: true
    time_slices: ["daily", "weekly", "monthly"]
  
  relationship_analysis:
    enabled: true
    min_interactions: 10
    relationship_strength_threshold: 0.3
  
  emotional_analysis:
    enabled: true
    emotion_detection_model: "basic"
    sentiment_analysis: true
  
  topic_analysis:
    enabled: true
    num_topics: 30
    algorithm: "lda"
    update_frequency: "weekly"