# SpiderMind Omega Custom Eras Configuration

# Settings for era detection and analysis
settings:
  auto_detect: true
  detection_method: "hybrid"  # Options: change_point, clustering, hybrid
  min_era_length_days: 30
  max_gap_days: 14
  significance_threshold: 0.7

# Time-based era definitions
time_based_eras:
  # Academic periods
  academic:
    - name: "High School"
      start: "2015-09-01"
      end: "2019-06-15"
      sub_eras:
        - name: "Freshman Year"
          start: "2015-09-01"
          end: "2016-06-15"
        - name: "Sophomore Year"
          start: "2016-09-01"
          end: "2017-06-15"
        - name: "Junior Year"
          start: "2017-09-01"
          end: "2018-06-15"
        - name: "Senior Year"
          start: "2018-09-01"
          end: "2019-06-15"
    
    - name: "College"
      start: "2019-09-01"
      end: "2023-05-15"
      sub_eras:
        - name: "Freshman Year"
          start: "2019-09-01"
          end: "2020-05-15"
        - name: "Sophomore Year"
          start: "2020-09-01"
          end: "2021-05-15"
        - name: "Junior Year"
          start: "2021-09-01"
          end: "2022-05-15"
        - name: "Senior Year"
          start: "2022-09-01"
          end: "2023-05-15"
    
    - name: "Graduate School"
      start: "2023-09-01"
      end: "2025-05-15"
      sub_eras:
        - name: "First Year"
          start: "2023-09-01"
          end: "2024-05-15"
        - name: "Second Year"
          start: "2024-09-01"
          end: "2025-05-15"
  
  # Life stages
  life_stages:
    - name: "Pre-College"
      start: "2015-01-01"
      end: "2019-08-31"
    
    - name: "College Years"
      start: "2019-09-01"
      end: "2023-05-15"
    
    - name: "Post-College Transition"
      start: "2023-05-16"
      end: "2023-08-31"
    
    - name: "Graduate School"
      start: "2023-09-01"
      end: "2025-09-26"  # Current date
  
  # Seasonal patterns
  seasons:
    - name: "Winter 2023"
      start: "2022-12-21"
      end: "2023-03-19"
    
    - name: "Spring 2023"
      start: "2023-03-20"
      end: "2023-06-20"
    
    - name: "Summer 2023"
      start: "2023-06-21"
      end: "2023-09-22"
    
    - name: "Fall 2023"
      start: "2023-09-23"
      end: "2023-12-20"
    
    - name: "Winter 2024"
      start: "2023-12-21"
      end: "2024-03-19"
    
    - name: "Spring 2024"
      start: "2024-03-20"
      end: "2024-06-20"
    
    - name: "Summer 2024"
      start: "2024-06-21"
      end: "2024-09-22"
    
    - name: "Fall 2024"
      start: "2024-09-23"
      end: "2024-12-20"
    
    - name: "Winter 2025"
      start: "2024-12-21"
      end: "2025-03-19"
    
    - name: "Spring 2025"
      start: "2025-03-20"
      end: "2025-06-20"
    
    - name: "Summer 2025"
      start: "2025-06-21"
      end: "2025-09-22"

# Event-based eras (significant life events that define periods)
event_based_eras:
  - name: "Pre-Pandemic"
    end: "2020-03-15"
    significance: "high"
  
  - name: "Pandemic Period"
    start: "2020-03-15"
    end: "2022-03-01"
    significance: "very high"
  
  - name: "Post-Pandemic Adjustment"
    start: "2022-03-01"
    end: "2022-12-31"
    significance: "high"

# Relationship eras (periods defined by significant relationships)
relationship_eras:
  # These would be filled in based on your specific relationship history
  # Example structure:
  - name: "Relationship with [Name]"
    start: "YYYY-MM-DD"
    end: "YYYY-MM-DD"
    person: "[Name]"
    significance: "high"
  
  # Add more as appropriate

# Location eras (periods defined by where you lived)
location_eras:
  # These would be filled in based on your location history
  # Example structure:
  - name: "Living in [City]"
    start: "YYYY-MM-DD"
    end: "YYYY-MM-DD"
    location: "[City, State/Country]"
    significance: "medium"
  
  # Add more as appropriate

# Professional eras (periods defined by work/career)
professional_eras:
  # These would be filled in based on your work history
  # Example structure:
  - name: "Working at [Company]"
    start: "YYYY-MM-DD"
    end: "YYYY-MM-DD"
    organization: "[Company]"
    role: "[Position]"
    significance: "high"
  
  # Add more as appropriate

# Personal growth eras (periods defined by significant personal development)
personal_growth_eras:
  # These would be filled in based on your personal development journey
  # Example structure:
  - name: "[Description] Phase"
    start: "YYYY-MM-DD"
    end: "YYYY-MM-DD"
    themes:
      - "[Theme 1]"
      - "[Theme 2]"
    significance: "high"
  
  # Add more as appropriate

# Era detection keywords (for automatic era identification)
era_keywords:
  academic_transitions:
    - "semester"
    - "finals"
    - "graduation"
    - "classes"
    - "school"
    - "college"
    - "university"
    - "dorm"
    - "campus"
  
  relationship_transitions:
    - "breakup"
    - "dating"
    - "together"
    - "relationship"
    - "single"
    - "love"
    - "partner"
  
  location_transitions:
    - "moving"
    - "moved"
    - "new apartment"
    - "new place"
    - "relocating"
    - "relocation"
    - "new city"
  
  professional_transitions:
    - "new job"
    - "interview"
    - "hired"
    - "fired"
    - "quit"
    - "promotion"
    - "career"
    - "work"
  
  emotional_transitions:
    - "depression"
    - "anxiety"
    - "therapy"
    - "healing"
    - "recovery"
    - "struggle"
    - "breakthrough"