version: '3.8'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=development
      - HOST=0.0.0.0
      - PORT=8000
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=advanced_data_analysis_twin
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=development_secret_key
      - CORS_ALLOWED_ORIGINS=*
    depends_on:
      - mongodb
      - neo4j
      - redis
    networks:
      - adatwin-network
    restart: unless-stopped

  # MongoDB Service
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - adatwin-network
    restart: unless-stopped

  # Neo4j Service
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password
    networks:
      - adatwin-network
    restart: unless-stopped

  # Redis Service
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - adatwin-network
    restart: unless-stopped

  # Web Frontend Service
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - adatwin-network
    restart: unless-stopped

volumes:
  mongodb_data:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  adatwin-network:
    driver: bridge