version: '3.8'

services:
  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./cache:/app/cache
    environment:
      - ENVIRONMENT=development
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/integrated_system
      - MONGODB_URI=mongodb://mongodb:27017/integrated_system
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      - postgres
      - mongodb
      - redis
      - neo4j
    networks:
      - integrated-network
    restart: unless-stopped
    command: uvicorn integrated_system.main:app --host 0.0.0.0 --port 8000 --reload

  # Web Interface
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app/web
    environment:
      - NODE_ENV=development
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - integrated-network
    restart: unless-stopped
    command: npm run dev

  # PostgreSQL Database
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=integrated_system
    networks:
      - integrated-network
    restart: unless-stopped

  # MongoDB Database
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - integrated-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - integrated-network
    restart: unless-stopped

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j-data:/data
    environment:
      - NEO4J_AUTH=neo4j/password
    networks:
      - integrated-network
    restart: unless-stopped

  # Jupyter Notebook for Data Analysis
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
      target: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./notebooks:/app/notebooks
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/integrated_system
      - MONGODB_URI=mongodb://mongodb:27017/integrated_system
    depends_on:
      - postgres
      - mongodb
    networks:
      - integrated-network
    restart: unless-stopped
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''

  # Visualization Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    ports:
      - "8050:8050"
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./visualization:/app/visualization
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - integrated-network
    restart: unless-stopped
    command: python -m visualization.dashboards.app

networks:
  integrated-network:
    driver: bridge

volumes:
  postgres-data:
  mongodb-data:
  redis-data:
  neo4j-data: