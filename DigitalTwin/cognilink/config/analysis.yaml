# CogniLink Analysis Configuration

# Communication pattern analysis configuration
patterns:
  # Time period for frequency analysis ("hour", "day", "week", "month")
  frequency_period: "day"
  
  # Window size for change analysis (in days)
  change_window_size: 30
  
  # Threshold for significant change (percentage)
  change_threshold: 50
  
  # Number of top communicators to identify
  top_communicators: 10
  
  # Number of strongest relationships to identify
  strongest_relationships: 10

# Relationship analysis configuration
relationships:
  # Number of key relationships to identify
  key_relationships: 20
  
  # Threshold for close relationships (message count)
  close_threshold: 10
  
  # Threshold for relationship balance (0.0 to 1.0)
  balance_threshold: 0.2
  
  # Minimum time span for relationship evolution analysis (in days)
  min_time_span: 30
  
  # Number of relationship groups to identify
  max_groups: 5

# Topic analysis configuration
topics:
  # Number of topics to extract
  num_topics: 8
  
  # Number of words per topic
  words_per_topic: 10
  
  # Number of key phrases to extract
  num_key_phrases: 20
  
  # Number of knowledge areas to identify
  num_knowledge_areas: 5
  
  # Minimum word frequency to include in topics
  min_word_frequency: 2
  
  # Stopwords file (path relative to config directory, empty for default)
  stopwords_file: ""