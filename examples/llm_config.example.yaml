# AegisTwin LLM Configuration Example
# Copy to llm_config.yaml and configure for your environment
#
# AI-GENERATED 2026-01-07

# LLM Provider Configuration
llm:
  # Provider: mock, openai, or anthropic
  provider: mock
  
  # Model to use (provider-specific)
  # OpenAI: gpt-4o-mini, gpt-4o, gpt-4-turbo
  # Anthropic: claude-3-haiku-20240307, claude-3-sonnet-20240229
  model: gpt-4o-mini
  
  # Maximum tokens to generate
  max_tokens: 1000
  
  # Sampling temperature (0.0 to 2.0)
  # Lower = more deterministic, Higher = more creative
  temperature: 0.7
  
  # Optional: Stop sequences
  # stop:
  #   - "\n\n"
  #   - "END"

# Policy Configuration
policies:
  # Allow LLM queries by default
  - id: allow-llm-mock
    action: llm.query
    resource: llm.mock
    effect: allow
    reason: Mock LLM queries are always allowed
    priority: 100
  
  # Optionally restrict external LLM access
  # - id: deny-external-llm
  #   action: llm.query
  #   resource: llm.external
  #   effect: deny
  #   reason: External LLM access requires approval
  #   priority: 200

# Rate Limiting (future feature)
rate_limits:
  # Requests per minute
  requests_per_minute: 60
  
  # Tokens per minute
  tokens_per_minute: 100000

# Audit Configuration
audit:
  # Log prompt previews (first N chars)
  prompt_preview_length: 200
  
  # Log full responses (be careful with PII)
  log_responses: false
  
  # Retention period in days
  retention_days: 90

# Environment Variables (do not commit with real values!)
# These can also be set as environment variables:
#   OPENAI_API_KEY=sk-...
#   ANTHROPIC_API_KEY=sk-ant-...
